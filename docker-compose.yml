# ===========================================
# FreeboxOS Ultra Dashboard - Docker Compose
# ===========================================
#
# Production deployment using pre-built image from GitHub Container Registry
#
# For local development (building from source), use docker-compose.local.yml instead
#
# Usage:
#   docker-compose up -d
#
# Environment variables (optional):
#   DASHBOARD_PORT - Dashboard port (default: 7505)
#   FREEBOX_HOST - Freebox hostname (default: mafreebox.freebox.fr)
#
# Examples:
#   DASHBOARD_PORT=8080 docker-compose up -d
#   docker-compose --env-file .env up -d
#
# MCP Server (optional — Claude AI integration):
#   docker-compose --profile mcp up -d

services:
  freebox-dashboard:
    image: ghcr.io/hghugo/freeboxos-ultra-dashboard:latest
    container_name: freebox-dashboard
    restart: unless-stopped

    # Port mapping: host:container
    ports:
      - "${DASHBOARD_PORT:-7505}:3000"

    # Environment configuration
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FREEBOX_HOST=${FREEBOX_HOST:-mafreebox.freebox.fr}
      - FREEBOX_TOKEN_FILE=/app/data/freebox_token.json
      # Optional: Mock mode for testing different Freebox models
      # - MOCK_FREEBOX_MODEL=ultra  # ultra, delta, pop, revolution

    # Persistent storage for Freebox API token
    volumes:
      - freebox_data:/app/data

    # Network mode options:
    # Option 1: Bridge mode (default) - uses port mapping
    # Option 2: Host mode - direct network access (uncomment below)
    # network_mode: host

    # Health check (use 127.0.0.1 instead of localhost to avoid IPv6 issues)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 256M
    #     reservations:
    #       cpus: '0.1'
    #       memory: 128M

  # ===========================================
  # MCP Server (optional) — Claude AI integration
  # ===========================================
  # Activate with: docker-compose --profile mcp up -d
  # See: https://github.com/leto1210/mafreebox-mcpserver
  freebox-mcp:
    image: ghcr.io/leto1210/mafreebox-mcpserver:latest
    container_name: freebox-mcp
    restart: unless-stopped
    profiles:
      - mcp
    environment:
      - FREEBOX_HOST=${FREEBOX_HOST:-mafreebox.freebox.fr}
      - FREEBOX_TOKEN_FILE=/app/data/freebox_token.json
    volumes:
      - freebox_mcp_data:/app/data
    # MCP servers communicate via stdio — no ports exposed

# Named volumes for persistent token storage
volumes:
  freebox_data:
    name: freebox_dashboard_data
  freebox_mcp_data:
    name: freebox_mcp_data
